<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found — Alex Spigler</title>
    <meta name="robots" content="noindex">
    <link rel="canonical" href="https://alexspigler.dev/">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;1,8..60,400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --fg: #1a1a1a;
            --fg-secondary: #4a4a4a;
            --bg: #faf9f7;
            --accent: #2c4a2e;
            --serif: 'Source Serif 4', Georgia, serif;
            --mono: 'IBM Plex Mono', 'Courier New', monospace;
        }
        html { font-size: 17px; }
        body {
            font-family: var(--serif);
            color: var(--fg);
            background: var(--bg);
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        h1 {
            font-family: var(--mono);
            font-size: 3rem;
            font-weight: 500;
            color: var(--accent);
            margin-bottom: 1rem;
        }
        p {
            font-size: 1.1rem;
            color: var(--fg-secondary);
            margin-bottom: 1.5rem;
        }
        a {
            font-family: var(--mono);
            font-size: 0.9rem;
            color: var(--accent);
            text-decoration: none;
            border-bottom: 1px solid var(--accent);
        }
        a:hover { opacity: 0.7; }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <p>This page doesn't exist.</p>
        <a href="/">Back to home</a>
    </div>
</body>
</html>
